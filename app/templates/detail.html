{% extends "base.html" %}

{% block title %}{{ product.name }} - Research Detail{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <a href="/launches" class="text-sm text-slate-500 hover:text-brand-500 font-semibold"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Launches</a>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8 space-y-6">
        <div class="flex justify-between items-start">
            <h1 class="text-3xl font-black text-slate-900">{{ product.name }}</h1>
            <a href="{{ product.product_hunt_url }}" target="_blank" class="bg-brand-500 hover:bg-brand-600 text-white font-bold text-sm px-4 py-2 rounded-xl transition">View on Product Hunt</a>
        </div>
        <p class="text-lg text-slate-600 font-semibold">{{ product.tagline }}</p>
        <p class="text-slate-700 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">{{ product.description }}</p>

        <form action="/launches/{{ product.id }}/note" method="post" class="space-y-4 pt-4 border-t border-slate-100">
            <div class="space-y-2">
                <label class="text-sm font-bold text-slate-700">Research Notes</label>
                <textarea name="note" class="w-full h-32 bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm">{{ product.note.text if product.note else '' }}</textarea>
            </div>
            <div class="flex gap-4 items-center">
                <div class="space-y-2 flex-1">
                    <label class="text-sm font-bold text-slate-700">Status Label</label>
                    <select name="status" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm">
                        <option value="none" {% if not product.note or product.note.status_label == 'none' %}selected{% endif %}>None</option>
                        <option value="shortlisted" {% if product.note and product.note.status_label == 'shortlisted' %}selected{% endif %}>⭐ Shortlisted</option>
                        <option value="interesting" {% if product.note and product.note.status_label == 'interesting' %}selected{% endif %}>💡 Interesting</option>
                        <option value="follow_up" {% if product.note and product.note.status_label == 'follow_up' %}selected{% endif %}>📅 Follow Up</option>
                    </select>
                </div>
                <button type="submit" class="bg-slate-900 text-white font-bold px-6 py-2 rounded-xl hover:bg-slate-800 transition">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
